<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>イベント予約</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f0f4f8; min-height: 100vh; }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #06C755 0%, #04a847 100%);
    color: #fff;
    padding: 16px 20px;
    text-align: center;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: .5px;
    box-shadow: 0 2px 8px rgba(6,199,85,.3);
    position: sticky; top: 0; z-index: 100;
  }

  .container { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* ── Card ── */
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
  }
  .card h2 { font-size: 13px; color: #9ca3af; margin-bottom: 16px; font-weight: 500; letter-spacing: .3px; }

  /* ── Loading ── */
  .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; }
  .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #06C755; border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: #9ca3af; }

  .error-wrap { text-align: center; padding: 48px 20px; }
  .error-icon { font-size: 40px; margin-bottom: 12px; }
  .error-msg { color: #ef4444; font-size: 14px; line-height: 1.6; }

  /* ── Buttons ── */
  .event-btn {
    display: block; width: 100%; padding: 16px;
    margin-bottom: 10px;
    border: 1.5px solid #e5e7eb;
    border-radius: 12px;
    background: #fff;
    color: #111827;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all .15s;
  }
  .event-btn:hover:not(:disabled) { border-color: #06C755; background: #f0fdf4; }
  .event-btn:active:not(:disabled) { transform: scale(.99); }
  .event-btn .sub { font-size: 12px; color: #6b7280; font-weight: 400; margin-top: 4px; }
  .event-btn:disabled { opacity: .4; cursor: default; }

  .sched-btn {
    display: block; width: 100%; padding: 14px 16px;
    margin-bottom: 8px;
    border: 1.5px solid #e5e7eb;
    border-radius: 12px;
    background: #fff;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: all .15s;
    position: relative;
  }
  .sched-btn:hover:not(.full):not(.already) { border-color: #06C755; background: #f0fdf4; }
  .sched-btn.full, .sched-btn.already { opacity: .5; cursor: default; }
  .sched-btn .date { font-weight: 600; color: #111827; font-size: 15px; }
  .sched-btn.full .date, .sched-btn.already .date { color: #9ca3af; }
  .sched-btn .info { font-size: 12px; color: #6b7280; margin-top: 3px; }
  .sched-badge {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px;
  }
  .badge-ok { background: #dcfce7; color: #16a34a; }
  .badge-full { background: #f3f4f6; color: #9ca3af; }
  .badge-already { background: #eff6ff; color: #3b82f6; }

  .btn-green {
    display: block; width: 100%; padding: 15px;
    background: #06C755; color: #fff;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .3px;
  }
  .btn-green:hover:not(:disabled) { background: #04a847; }
  .btn-green:active:not(:disabled) { transform: scale(.99); }
  .btn-green:disabled { opacity: .5; cursor: default; }

  .btn-gray {
    display: block; width: 100%; padding: 13px;
    background: #fff; color: #6b7280;
    border: 1.5px solid #e5e7eb; border-radius: 12px;
    font-size: 14px; cursor: pointer; margin-top: 10px;
    transition: all .15s;
  }
  .btn-gray:hover { background: #f9fafb; }

  .btn-red {
    display: block; width: 100%; padding: 13px;
    background: #fff; color: #ef4444;
    border: 1.5px solid #fecaca; border-radius: 12px;
    font-size: 14px; cursor: pointer; margin-top: 10px;
    transition: all .15s;
  }
  .btn-red:hover { background: #fef2f2; }

  /* ── Form ── */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: #6b7280; margin-bottom: 6px; display: block; font-weight: 500; }
  .form-label span { color: #ef4444; margin-left: 2px; }
  .form-input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid #e5e7eb; border-radius: 10px;
    font-size: 15px; outline: none;
    transition: border-color .15s, box-shadow .15s;
    background: #f9fafb;
  }
  .form-input:focus { border-color: #06C755; box-shadow: 0 0 0 3px rgba(6,199,85,.1); background: #fff; }
  .form-select {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid #e5e7eb; border-radius: 10px;
    font-size: 15px; background: #f9fafb; outline: none;
    transition: border-color .15s;
  }
  .form-select:focus { border-color: #06C755; background: #fff; }

  /* ── Confirm ── */
  .confirm-box { background: #f9fafb; border-radius: 12px; padding: 16px; margin-bottom: 18px; }
  .confirm-row { display: flex; padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
  .confirm-row:last-child { border-bottom: none; }
  .confirm-label { color: #9ca3af; font-size: 12px; min-width: 72px; padding-top: 1px; font-weight: 500; }
  .confirm-val { color: #111827; font-weight: 500; flex: 1; font-size: 14px; }

  /* ── Reservation cards ── */
  .rsv-card {
    border: 1.5px solid #e5e7eb;
    border-radius: 14px; padding: 16px;
    margin-bottom: 12px; background: #fff;
    transition: box-shadow .15s;
  }
  .rsv-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .rsv-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .rsv-id { font-size: 11px; color: #9ca3af; font-family: monospace; }
  .rsv-status {
    font-size: 11px; font-weight: 700;
    background: #dcfce7; color: #16a34a;
    padding: 3px 8px; border-radius: 20px;
  }
  .rsv-event { font-size: 17px; font-weight: 700; color: #111827; margin-bottom: 6px; }
  .rsv-detail { font-size: 13px; color: #6b7280; line-height: 1.8; }
  .rsv-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .rsv-actions .btn-green { font-size: 13px; padding: 11px; margin-top: 0; }
  .rsv-actions .btn-red { font-size: 13px; padding: 11px; margin-top: 0; border-radius: 10px; }

  /* ── Done / Cancelled ── */
  .done-wrap { text-align: center; padding: 36px 16px; }
  .done-icon { font-size: 56px; margin-bottom: 16px; line-height: 1; }
  .done-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #111827; }
  .done-sub { font-size: 14px; color: #6b7280; margin-bottom: 28px; }

  .status-none { text-align: center; padding: 36px; color: #9ca3af; font-size: 14px; }

  /* ── Screen manager ── */
  .screen { display: none; }
</style>
</head>
<body>
<div class="header">イベント予約</div>
<div class="container">

  <div id="s-loading" class="screen">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text" id="loading-msg">読み込み中...</div>
    </div>
  </div>

  <div id="s-error" class="screen">
    <div class="card">
      <div class="error-wrap">
        <div class="error-icon">⚠️</div>
        <div class="error-msg" id="error-msg"></div>
      </div>
    </div>
  </div>

  <!-- プロフィール登録 -->
  <div id="s-profile" class="screen">
    <div class="card">
      <h2>はじめに情報を登録してください</h2>
      <div class="form-group">
        <label class="form-label">お名前<span>*</span></label>
        <input class="form-input" id="inp-name" type="text" placeholder="例：山田 太郎" maxlength="30">
      </div>
      <div class="form-group">
        <label class="form-label">年齢<span>*</span></label>
        <input class="form-input" id="inp-age" type="number" placeholder="例：25" min="1" max="120">
      </div>
      <div class="form-group">
        <label class="form-label">性別<span>*</span></label>
        <select class="form-select" id="inp-gender">
          <option value="">選択してください</option>
          <option value="男性">男性</option>
          <option value="女性">女性</option>
          <option value="その他">その他</option>
          <option value="未回答">未回答</option>
        </select>
      </div>
      <button class="btn-green" id="profile-btn" onclick="submitProfile()">次へ</button>
    </div>
  </div>

  <!-- イベント選択 -->
  <div id="s-event" class="screen">
    <div class="card">
      <h2>イベントを選択してください</h2>
      <div id="event-list"></div>
    </div>
  </div>

  <!-- 日程選択 -->
  <div id="s-sched" class="screen">
    <div class="card">
      <h2 id="sched-title">日程を選択してください</h2>
      <div id="sched-list"></div>
      <button class="btn-gray" id="sched-back-btn">戻る</button>
    </div>
  </div>

  <!-- 予約確認 -->
  <div id="s-confirm" class="screen">
    <div class="card">
      <h2>予約内容を確認してください</h2>
      <div class="confirm-box" id="confirm-detail"></div>
      <button class="btn-green" id="confirm-btn" onclick="submitReservation()">この内容で予約する</button>
      <button class="btn-gray" onclick="showScreen('sched')">戻る</button>
    </div>
  </div>

  <!-- 予約完了 -->
  <div id="s-done" class="screen">
    <div class="card">
      <div class="done-wrap">
        <div class="done-icon" id="done-icon">✅</div>
        <div class="done-title" id="done-title">予約が完了しました</div>
        <div class="done-sub" id="done-detail"></div>
        <button class="btn-green" onclick="safeClose()">閉じる</button>
      </div>
    </div>
  </div>

  <!-- 予約一覧 -->
  <div id="s-myrsv" class="screen">
    <div class="card">
      <h2>予約一覧</h2>
      <div id="myrsv-list"></div>
      <button class="btn-gray" onclick="safeClose()">閉じる</button>
    </div>
  </div>

  <!-- キャンセル完了 -->
  <div id="s-cancelled" class="screen">
    <div class="card">
      <div class="done-wrap">
        <div class="done-icon">🗑️</div>
        <div class="done-title">キャンセルしました</div>
        <div class="done-sub">またのご参加をお待ちしています</div>
        <button class="btn-green" onclick="loadMyReservations()">予約一覧に戻る</button>
        <button class="btn-gray" onclick="safeClose()">閉じる</button>
      </div>
    </div>
  </div>

</div>

<script>
'use strict';

const LIFF_ID  = '2009742773-6qUiijpk';
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbw2udOG7cW1XConkIKQGWNUOUrIzVqoGKx4Rm7AmtTZMxz3XVpDR8DLlr8_qYfi8O36/exec';

// ── アプリ状態 ─────────────────────────────────
const state = {
  userId:               '',
  userName:             '',
  userInfo:             null,   // getUserInfo() の結果をキャッシュ
  selectedEvent:        null,
  selectedSched:        null,
  changeFromEventId:    null,
  changingReservationId:null,
  cbCount:              0,
  submitting:           false,  // 二重送信防止フラグ
};

// ── JSONP ─────────────────────────────────────
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cbName = '__cb' + (state.cbCount++);
    const timeoutId = setTimeout(() => {
      cleanup();
      reject(new Error('タイムアウトしました（20秒）'));
    }, 20000);

    function cleanup() {
      clearTimeout(timeoutId);
      delete window[cbName];
      document.getElementById(cbName + '_s')?.remove();
    }

    window[cbName] = (data) => { cleanup(); resolve(data); };

    params.callback = cbName;
    params._t = Date.now();

    const el = document.createElement('script');
    el.id = cbName + '_s';
    el.src = GAS_URL + '?' + new URLSearchParams(params).toString();
    el.onerror = () => { cleanup(); reject(new Error('通信エラーが発生しました')); };
    document.body.appendChild(el);
  });
}

// ── 初期化 ────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  showScreen('loading');
  setLoadingMsg('起動中...');
});

liff.init({ liffId: LIFF_ID }).then(async () => {
  if (!liff.isLoggedIn()) { liff.login(); return; }

  const prof = await liff.getProfile();
  state.userId   = prof.userId;
  state.userName = prof.displayName;

  setLoadingMsg('データを読み込み中...');
  const mode = new URLSearchParams(location.search).get('mode');

  try {
    const init = await jsonp({ action: 'getInitialData', userId: state.userId });

    // userInfoをキャッシュ（確認画面で再取得しない）
    state.userInfo = init.userInfo;

    if (init.userInfo.status === 'none') {
      document.getElementById('inp-name').value = state.userName;
      showScreen('profile');
      return;
    }

    if (mode === 'myrsv') {
      renderMyReservations(init.reservations);
    } else {
      renderEvents(init.events, null);
    }
  } catch(err) {
    showError('読み込みに失敗しました。\nLINEアプリを再起動してお試しください。\n\n詳細: ' + err.message);
  }

}).catch(err => showError('初期化エラー: ' + err.message));

// ── プロフィール登録 ──────────────────────────
async function submitProfile() {
  const name   = document.getElementById('inp-name').value.trim();
  const age    = document.getElementById('inp-age').value.trim();
  const gender = document.getElementById('inp-gender').value;

  if (!name)   { alert('お名前を入力してください'); return; }
  if (!age || isNaN(age) || age < 1 || age > 120) { alert('正しい年齢を入力してください'); return; }
  if (!gender) { alert('性別を選択してください'); return; }

  const btn = document.getElementById('profile-btn');
  btn.disabled = true;
  btn.textContent = '登録中...';

  try {
    const data = await jsonp({ action: 'registerUser', userId: state.userId, name, age, gender });
    if (data.status === 'ok') {
      state.userInfo = { status: 'found', name, age, gender };
      const mode = new URLSearchParams(location.search).get('mode');
      if (mode === 'myrsv') {
        loadMyReservations();
      } else {
        loadEvents();
      }
    } else {
      alert('登録に失敗しました: ' + (data.message || '不明なエラー'));
      btn.disabled = false;
      btn.textContent = '次へ';
    }
  } catch(e) {
    alert('通信エラー: ' + e.message);
    btn.disabled = false;
    btn.textContent = '次へ';
  }
}

// ── イベント一覧 ──────────────────────────────
async function loadEvents(filterEventId) {
  showScreen('loading');
  setLoadingMsg('イベントを読み込み中...');
  state.changeFromEventId = filterEventId || null;
  try {
    const data = await jsonp({ action: 'getEvents', userId: state.userId });
    renderEvents(data.events || [], filterEventId);
  } catch(e) {
    showError('イベントの取得に失敗しました: ' + e.message);
  }
}

function renderEvents(events, filterEventId) {
  state.changeFromEventId = filterEventId || null;
  if (filterEventId) {
    events = events.filter(e => e.id === filterEventId);
  }
  if (!events || events.length === 0) {
    showError('現在受付中のイベントはありません。\n次回のイベントをお楽しみに！');
    return;
  }

  const list = document.getElementById('event-list');
  list.innerHTML = '';

  events.forEach(ev => {
    const btn = document.createElement('button');
    btn.className = 'event-btn';

    if (ev.alreadyBooked) {
      btn.disabled = true;
      btn.innerHTML = `${escHtml(ev.name)}<div class="sub">申込済み（変更・取消は「予約確認」から）</div>`;
    } else {
      btn.innerHTML = `${escHtml(ev.name)}<div class="sub">${escHtml(ev.description || '')}</div>`;
      btn.onclick = () => loadSchedules(ev);
    }
    list.appendChild(btn);
  });

  showScreen('event');
}

// ── 日程一覧 ──────────────────────────────────
async function loadSchedules(ev) {
  state.selectedEvent = ev;
  showScreen('loading');
  setLoadingMsg('日程を読み込み中...');

  try {
    const data = await jsonp({ action: 'getSchedules', eventId: ev.id, userId: state.userId });

    document.getElementById('sched-title').textContent = ev.name + ' の日程を選択';
    document.getElementById('sched-back-btn').onclick =
      state.changingReservationId
        ? () => loadMyReservations()   // 変更フロー → 予約一覧へ
        : () => showScreen('event');   // 新規フロー → イベント一覧へ

    const list = document.getElementById('sched-list');
    list.innerHTML = '';

    if (!data.schedules || data.schedules.length === 0) {
      list.innerHTML = '<p style="color:#9ca3af;font-size:13px;padding:8px 0;">受付中の日程がありません</p>';
    } else {
      data.schedules.forEach(s => {
        const btn = document.createElement('button');

        if (s.alreadyBooked) {
          btn.className = 'sched-btn already';
          btn.innerHTML = `
            <span class="sched-badge badge-already">申込済み</span>
            <div class="date">${escHtml(s.datetime)}</div>
            <div class="info">📍 ${escHtml(s.location)}</div>`;
        } else if (s.remaining <= 0) {
          btn.className = 'sched-btn full';
          btn.innerHTML = `
            <span class="sched-badge badge-full">満席</span>
            <div class="date">${escHtml(s.datetime)}</div>
            <div class="info">📍 ${escHtml(s.location)}</div>`;
        } else {
          btn.className = 'sched-btn';
          const remainLabel = s.remaining <= 3
            ? `<span style="color:#ef4444;">残り${s.remaining}人</span>`
            : `残り${s.remaining}人`;
          btn.innerHTML = `
            <span class="sched-badge badge-ok">${remainLabel}</span>
            <div class="date">${escHtml(s.datetime)}</div>
            <div class="info">📍 ${escHtml(s.location)}</div>`;
          btn.onclick = () => showConfirm(s);
        }
        list.appendChild(btn);
      });
    }
    showScreen('sched');
  } catch(e) {
    showError('日程の取得に失敗しました: ' + e.message);
  }
}

// ── 予約確認画面 ──────────────────────────────
// キャッシュ済みuserInfoを使い、余分なAPI呼び出しを削除
function showConfirm(sched) {
  state.selectedSched = sched;

  const info = state.userInfo || {};
  document.getElementById('confirm-detail').innerHTML = `
    <div class="confirm-row">
      <div class="confirm-label">お名前</div>
      <div class="confirm-val">${escHtml(info.name || state.userName)}</div>
    </div>
    <div class="confirm-row">
      <div class="confirm-label">年齢</div>
      <div class="confirm-val">${escHtml(String(info.age || '-'))}</div>
    </div>
    <div class="confirm-row">
      <div class="confirm-label">性別</div>
      <div class="confirm-val">${escHtml(info.gender || '-')}</div>
    </div>
    <div class="confirm-row">
      <div class="confirm-label">イベント</div>
      <div class="confirm-val">${escHtml(state.selectedEvent.name)}</div>
    </div>
    <div class="confirm-row">
      <div class="confirm-label">日時</div>
      <div class="confirm-val">📅 ${escHtml(sched.datetime)}</div>
    </div>
    <div class="confirm-row">
      <div class="confirm-label">場所</div>
      <div class="confirm-val">📍 ${escHtml(sched.location)}</div>
    </div>`;

  const confirmBtn = document.getElementById('confirm-btn');
  confirmBtn.disabled = false;
  confirmBtn.textContent = state.changingReservationId ? '変更を確定する' : 'この内容で予約する';
  showScreen('confirm');
}

// ── 予約送信（二重送信防止つき）────────────────
async function submitReservation() {
  if (state.submitting) return; // 二重送信防止
  state.submitting = true;

  const btn = document.getElementById('confirm-btn');
  btn.disabled = true;
  btn.textContent = '処理中...';

  try {
    let data;
    if (state.changingReservationId) {
      data = await jsonp({
        action:           'change',
        userId:           state.userId,
        oldReservationId: state.changingReservationId,
        newSchedId:       state.selectedSched.schedId,
        name:             state.userInfo?.name || state.userName,
      });
    } else {
      data = await jsonp({
        action:  'reserve',
        userId:  state.userId,
        schedId: state.selectedSched.schedId,
        name:    state.userInfo?.name || state.userName,
      });
    }

    if (data.status === 'ok') {
      const isChange = !!state.changingReservationId;
      document.getElementById('done-icon').textContent  = isChange ? '🔄' : '✅';
      document.getElementById('done-title').textContent = isChange ? '日程変更が完了しました' : '予約が完了しました';
      document.getElementById('done-detail').textContent = '予約ID: ' + data.reservationId;
      state.changingReservationId = null;
      showScreen('done');
    } else {
      alert(data.message || '処理に失敗しました');
      btn.disabled = false;
      btn.textContent = state.changingReservationId ? '変更を確定する' : 'この内容で予約する';
    }
  } catch(e) {
    alert('通信エラー: ' + e.message);
    btn.disabled = false;
    btn.textContent = state.changingReservationId ? '変更を確定する' : 'この内容で予約する';
  } finally {
    state.submitting = false;
  }
}

// ── 予約一覧 ──────────────────────────────────
async function loadMyReservations() {
  showScreen('loading');
  setLoadingMsg('予約を読み込み中...');
  try {
    const data = await jsonp({ action: 'getMyReservations', userId: state.userId });
    renderMyReservations(data.reservations || []);
  } catch(e) {
    showError('予約情報の取得に失敗しました: ' + e.message);
  }
}

function renderMyReservations(reservations) {
  const list = document.getElementById('myrsv-list');
  if (!reservations.length) {
    list.innerHTML = '<div class="status-none">現在予約はありません。</div>';
  } else {
    list.innerHTML = reservations.map(r => `
      <div class="rsv-card">
        <div class="rsv-card-head">
          <div class="rsv-id">${escHtml(r.reservationId)}</div>
          <div class="rsv-status">予約中</div>
        </div>
        <div class="rsv-event">${escHtml(r.eventName)}</div>
        <div class="rsv-detail">
          📅 ${escHtml(r.datetime)}<br>
          📍 ${escHtml(r.location)}
        </div>
        <div class="rsv-actions">
          <button class="btn-green" onclick="startChange('${escHtml(r.reservationId)}','${escHtml(r.eventId)}')">日程変更</button>
          <button class="btn-red" onclick="confirmCancel('${escHtml(r.reservationId)}')">キャンセル</button>
        </div>
      </div>
    `).join('');
  }
  showScreen('myrsv');
}

// ── キャンセル ────────────────────────────────
function confirmCancel(reservationId) {
  if (!confirm('この予約をキャンセルしてよろしいですか？\n\nキャンセル後の取り消しはできません。')) return;
  doCancel(reservationId);
}

async function doCancel(reservationId) {
  showScreen('loading');
  setLoadingMsg('キャンセル処理中...');
  try {
    const data = await jsonp({ action: 'cancel', userId: state.userId, reservationId });
    if (data.status === 'ok') {
      showScreen('cancelled');
    } else {
      alert(data.message || 'キャンセルに失敗しました');
      loadMyReservations();
    }
  } catch(e) {
    alert('通信エラー: ' + e.message);
    loadMyReservations();
  }
}

// ── 日程変更 ──────────────────────────────────
function startChange(reservationId, eventId) {
  state.changingReservationId = reservationId;
  loadEvents(eventId);
}

// ── ユーティリティ ─────────────────────────────
function showScreen(name) {
  ['loading','error','profile','event','sched','confirm','done','myrsv','cancelled'].forEach(s => {
    const el = document.getElementById('s-' + s);
    if (el) el.style.display = (s === name) ? 'block' : 'none';
  });
}

function setLoadingMsg(msg) {
  const el = document.getElementById('loading-msg');
  if (el) el.textContent = msg;
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  showScreen('error');
}

// XSS対策: HTMLエスケープ
function escHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// liff.closeWindow() のラッパー（エラー対策）
function safeClose() {
  try { liff.closeWindow(); } catch(e) { window.close(); }
}
</script>
