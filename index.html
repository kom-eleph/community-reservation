<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コミュニティ予約</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
  .header { background: #06C755; color: #fff; padding: 16px; text-align: center; font-size: 18px; font-weight: bold; }
  .container { padding: 16px; max-width: 480px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h2 { font-size: 14px; color: #888; margin-bottom: 12px; }
  .event-btn { display: block; width: 100%; padding: 14px; margin-bottom: 8px; border: 1.5px solid #06C755; border-radius: 8px; background: #fff; color: #06C755; font-size: 15px; font-weight: bold; cursor: pointer; text-align: left; }
  .event-btn .sub { font-size: 12px; color: #888; font-weight: normal; margin-top: 2px; }
  .sched-btn { display: block; width: 100%; padding: 12px 14px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 14px; cursor: pointer; text-align: left; }
  .sched-btn.full { color: #bbb; border-color: #eee; }
  .sched-btn .date { font-weight: bold; color: #333; }
  .sched-btn .info { font-size: 12px; color: #888; margin-top: 2px; }
  .sched-btn .cap { font-size: 12px; color: #06C755; float: right; }
  .sched-btn.full .cap { color: #bbb; }
  .confirm-box { background: #f9f9f9; border-radius: 8px; padding: 14px; margin-bottom: 16px; font-size: 14px; line-height: 2; }
  .confirm-box .label { color: #888; font-size: 12px; }
  .btn-green { display: block; width: 100%; padding: 14px; background: #06C755; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
  .btn-gray { display: block; width: 100%; padding: 12px; background: #fff; color: #888; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 8px; }
  .loading { text-align: center; padding: 40px; color: #888; }
  .error { text-align: center; padding: 40px; color: #e53935; }
  #screen-event, #screen-sched, #screen-confirm, #screen-done { display: none; }
  .my-rsv-box { background: #f9f9f9; border-radius: 8px; padding: 14px; margin-bottom: 16px; font-size: 14px; line-height: 2; }
  .my-rsv-box .label { color: #888; font-size: 12px; }
  .btn-red { display: block; width: 100%; padding: 12px; background: #fff; color: #e53935; border: 1px solid #e53935; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 8px; }
  .status-none { text-align: center; padding: 24px; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div class="header">コミュニティ予約</div>
<div class="container">
  <div id="screen-loading" class="loading">読み込み中...</div>
  <div id="screen-error" class="error" style="display:none;"></div>

  <div id="screen-event">
    <div class="card">
      <h2>イベントを選択してください</h2>
      <div id="event-list"></div>
    </div>
  </div>

  <div id="screen-sched">
    <div class="card">
      <h2 id="sched-title">日程を選択してください</h2>
      <div id="sched-list"></div>
      <button class="btn-gray" onclick="showScreen('event')">戻る</button>
    </div>
  </div>

  <div id="screen-confirm">
    <div class="card">
      <h2>予約内容を確認してください</h2>
      <div class="confirm-box" id="confirm-detail"></div>
      <button class="btn-green" id="confirm-btn" onclick="submitReservation()">この内容で予約する</button>
      <button class="btn-gray" onclick="showScreen('sched')">戻る</button>
    </div>
  </div>

  <div id="screen-done">
    <div class="card" style="text-align:center; padding:32px 16px;">
      <div style="font-size:48px; margin-bottom:16px;">✅</div>
      <div style="font-size:18px; font-weight:bold; margin-bottom:8px;">予約が完了しました</div>
      <div id="done-detail" style="font-size:14px; color:#888; margin-bottom:24px;"></div>
      <button class="btn-green" onclick="liff.closeWindow()">閉じる</button>
    </div>
  </div>
</div>

<script>
const LIFF_ID = '2009742773-6qUiijpk';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw2udOG7cW1XConkIKQGWNUOUrIzVqoGKx4Rm7AmtTZMxz3XVpDR8DLlr8_qYfi8O36/exec';

let userId   = '';
let userName = '';
let selectedEvent = null;
let selectedSched = null;
let cbCount = 0;

// ── JSONP呼び出し共通関数 ─────────────────────
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cbName = '__cb' + (cbCount++);
    const timeout = setTimeout(() => {
      delete window[cbName];
      reject(new Error('timeout'));
    }, 15000);

    window[cbName] = (data) => {
      clearTimeout(timeout);
      delete window[cbName];
      const el = document.getElementById(cbName + '_script');
      if (el) el.remove();
      resolve(data);
    };

    params.callback = cbName;
    const qs  = new URLSearchParams(params).toString();
    const el  = document.createElement('script');
    el.id     = cbName + '_script';
    el.src    = GAS_URL + '?' + qs;
    el.onerror = () => {
      clearTimeout(timeout);
      delete window[cbName];
      el.remove();
      reject(new Error('script error'));
    };
    document.body.appendChild(el);
  });
}

// ── 初期化 ───────────────────────────────────
liff.init({ liffId: LIFF_ID }).then(async () => {
  if (!liff.isLoggedIn()) { liff.login(); return; }
  const profile = await liff.getProfile();
  userId   = profile.userId;
  userName = profile.displayName;
  loadEvents();
}).catch(err => showError('初期化エラー: ' + err.message));

// ── イベント一覧 ─────────────────────────────
async function loadEvents() {
  try {
    const data = await jsonp({ action: 'getEvents' });
    if (!data.events || data.events.length === 0) {
      showError('現在受付中のイベントはありません。');
      return;
    }
    const list = document.getElementById('event-list');
    list.innerHTML = '';
    data.events.forEach(ev => {
      const btn = document.createElement('button');
      btn.className = 'event-btn';
      btn.innerHTML = `${ev.name}<div class="sub">${ev.description || ''}</div>`;
      btn.onclick = () => loadSchedules(ev);
      list.appendChild(btn);
    });
    showScreen('event');
  } catch(e) { showError('イベント取得に失敗しました: ' + e.message); }
}

// ── 日程一覧 ─────────────────────────────────
async function loadSchedules(ev) {
  selectedEvent = ev;
  document.getElementById('sched-title').textContent = ev.name + ' の日程を選択';
  showScreen('loading');
  try {
    const data = await jsonp({ action: 'getSchedules', eventId: ev.id });
    const list = document.getElementById('sched-list');
    list.innerHTML = '';
    if (!data.schedules || data.schedules.length === 0) {
      list.innerHTML = '<p style="color:#888;font-size:13px;">受付中の日程がありません</p>';
    } else {
      data.schedules.forEach(s => {
        const btn  = document.createElement('button');
        const full = s.remaining <= 0;
        btn.className = 'sched-btn' + (full ? ' full' : '');
        btn.innerHTML = `
          <span class="cap">${full ? '満席' : '残り' + s.remaining + '人'}</span>
          <div class="date">${s.datetime}</div>
          <div class="info">${s.location}</div>`;
        if (!full) btn.onclick = () => showConfirm(s);
        list.appendChild(btn);
      });
    }
    showScreen('sched');
  } catch(e) { showError('日程取得に失敗しました: ' + e.message); }
}

// ── 確認画面 ─────────────────────────────────
function showConfirm(sched) {
  selectedSched = sched;
  document.getElementById('confirm-detail').innerHTML = `
    <div><span class="label">お名前</span><br>${userName}</div>
    <div><span class="label">イベント</span><br>${selectedEvent.name}</div>
    <div><span class="label">日時</span><br>${sched.datetime}</div>
    <div><span class="label">場所</span><br>${sched.location}</div>`;
  showScreen('confirm');
}

// ── 予約送信 ─────────────────────────────────
async function submitReservation() {
  const btn = document.getElementById('confirm-btn');
  btn.disabled = true;
  btn.textContent = '処理中...';
  try {
    const data = await jsonp({
      action:  'reserve',
      userId:  userId,
      schedId: selectedSched.schedId,
      name:    userName,
    });
    if (data.status === 'ok') {
      document.getElementById('done-detail').textContent =
        '予約ID: ' + data.reservationId;
      showScreen('done');
    } else {
      alert(data.message || '予約に失敗しました');
      btn.disabled = false;
      btn.textContent = 'この内容で予約する';
    }
  } catch(e) {
    alert('通信エラーが発生しました: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'この内容で予約する';
  }
}

// ── ユーティリティ ────────────────────────────
function showScreen(name) {
  ['loading','error','event','sched','confirm','done'].forEach(s => {
    document.getElementById('screen-' + s).style.display =
      s === name ? 'block' : 'none';
  });
}
function showError(msg) {
  document.getElementById('screen-error').textContent = msg;
  showScreen('error');
}
</script>
</body>
</html>
